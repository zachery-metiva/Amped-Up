services:
  - type: web
    name: amped-up-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m alembic upgrade head && python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: WATSONX_API_KEY
        sync: false
      - key: WATSONX_PROJECT_ID
        sync: false
      - key: WATSONX_URL
        sync: false
